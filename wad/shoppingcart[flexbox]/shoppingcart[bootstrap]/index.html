<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftShop | Bootstrap Version</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom tweaks to complement Bootstrap */
        body { background-color: #f8f9fa; }
        .page { display: none; min-height: 80vh; }
        .active { display: block; }
        .product-emoji { font-size: 4rem; text-align: center; padding: 20px; background: #eee; }
        .cart-badge { font-size: 0.75rem; vertical-align: top; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-info" href="#" onclick="showPage('catalog')">SwiftShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('catalog')">Catalog</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showPage('cart')">
                            Cart <span id="cart-count" class="badge rounded-pill bg-info text-dark">0</span>
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link btn btn-outline-info ms-lg-2" href="#" onclick="showPage('login')">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        
        <section id="register" class="page">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card shadow border-0">
                        <div class="card-body p-5">
                            <h2 class="text-center mb-4">Register</h2>
                            <form onsubmit="event.preventDefault(); alert('Account Created!'); showPage('login')">
                                <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control" required></div>
                                <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
                                <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" required></div>
                                <button class="btn btn-info w-100 mt-3">Sign Up</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="login" class="page">
            <div class="row justify-content-center">
                <div class="col-md-4">
                    <div class="card shadow border-0">
                        <div class="card-body p-5">
                            <h2 class="text-center mb-4">Login</h2>
                            <form onsubmit="event.preventDefault(); showPage('catalog')">
                                <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
                                <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" required></div>
                                <button class="btn btn-primary w-100">Login</button>
                                <p class="text-center mt-3 small">Need an account? <a href="#" onclick="showPage('register')">Register</a></p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="catalog" class="page active">
            <h2 class="mb-4 border-bottom pb-2">Product Catalog</h2>
            <div class="row g-4" id="product-list">
                </div>
        </section>

        <section id="cart" class="page">
            <h2 class="mb-4 border-bottom pb-2">Your Shopping Cart</h2>
            <div class="card shadow-sm border-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr><th>Product</th><th class="text-end">Price</th><th class="text-center">Action</th></tr>
                        </thead>
                        <tbody id="cart-items"></tbody>
                    </table>
                </div>
                <div id="cart-empty" class="text-center py-5">
                    <p class="text-muted">Your cart is currently empty.</p>
                    <button class="btn btn-outline-primary" onclick="showPage('catalog')">Browse Products</button>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center p-4">
                    <h4 class="mb-0">Total: <span id="cart-total" class="text-primary">$0.00</span></h4>
                    <button class="btn btn-success btn-lg" onclick="alert('Order Successful!')">Place Order</button>
                </div>
            </div>
        </section>

    </main>

    <footer class="bg-dark text-secondary py-4 text-center mt-auto">
        <div class="container">
            <small>&copy; 2026 SwiftShop Frameworks Lab.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const products = [
            { id: 1, name: "Noise-Cancelling Headphones", price: 150, img: "🎧" },
            { id: 2, name: "Fitness Smartwatch", price: 210, img: "⌚" },
            { id: 3, name: "Mechanical Keyboard", price: 85, img: "⌨️" },
            { id: 4, name: "Ergonomic Mouse", price: 45, img: "🖱️" }
        ];

        let cart = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // Close the Bootstrap mobile navbar collapse if it's open
            const navCollapse = document.getElementById('navMenu');
            if(navCollapse.classList.contains('show')) {
                bootstrap.Collapse.getInstance(navCollapse).hide();
            }
        }

        function renderCatalog() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="product-emoji">${p.img}</div>
                        <div class="card-body d-flex flex-column text-center">
                            <h6 class="card-title fw-bold">${p.name}</h6>
                            <p class="text-primary fw-bold">$${p.price}</p>
                            <button class="btn btn-outline-info mt-auto btn-sm" onclick="addToCart(${p.id})">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsTable = document.getElementById('cart-items');
            const emptyMsg = document.getElementById('cart-empty');
            
            emptyMsg.style.display = cart.length === 0 ? 'block' : 'none';
            
            itemsTable.innerHTML = cart.map((item, index) => `
                <tr>
                    <td class="ps-4 font-weight-bold">${item.name}</td>
                    <td class="text-end">$${item.price}</td>
                    <td class="text-center">
                        <button class="btn btn-sm text-danger" onclick="cart.splice(${index}, 1); updateCartUI()">Remove</button>
                    </td>
                </tr>
            `).join('');

            const total = cart.reduce((acc, curr) => acc + curr.price, 0);
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        // Run on load
        renderCatalog();
    </script>
</body>
</html>
