<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App | ES6 Fix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f8f9fa; }
        .container { max-width: 700px; margin-top: 50px; }
        .weather-display { background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 12px rgba(0,0,0,0.1); }
        #errorLog { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="weather-display shadow-sm">
        <h2 class="text-center mb-4">Weather Graph (ES6)</h2>
        
        <div class="input-group mb-3">
            <input type="text" id="cityInput" class="form-control" placeholder="Enter city (e.g. New York)">
            <button class="btn btn-primary" id="btnSearch">Get Weather</button>
        </div>

        <div id="errorLog" class="alert alert-danger"></div>

        <canvas id="weatherChart" width="400" height="200"></canvas>
    </div>
</div>

<script>
    // 1. Arrow Function & Constants
    const API_KEY = '32543ba802f1bce9bd6816e1debba872'; 
    let myChart = null;

    const fetchWeather = async (city) => {
        const errorDiv = document.getElementById('errorLog');
        errorDiv.style.display = 'none';

        // 2. Promises & Async/Await
        try {
            // Using the 5-day forecast endpoint
            const response = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`);
            
            if (!response.ok) {
                throw new Error(`Status ${response.status}: City not found or API Key pending.`);
            }

            const data = await response.json();
            updateChart(data);

        } catch (err) {
            errorDiv.innerText = err.message;
            errorDiv.style.display = 'block';
        }
    };

    const updateChart = (data) => {
        const ctx = document.getElementById('weatherChart').getContext('2d');
        
        // 3. Callbacks (map/filter)
        // Taking one reading every 8 entries (since data is every 3 hours, 8 entries = 24 hours)
        const dailyData = data.list.filter((_, index) => index % 8 === 0);
        
        const labels = dailyData.map(item => new Date(item.dt_txt).toLocaleDateString());
        const temps = dailyData.map(item => item.main.temp);

        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: `Temperature in ${data.city.name} (°C)`,
                    data: temps,
                    borderColor: '#0d6efd',
                    fill: false,
                    tension: 0.1
                }]
            }
        });
    };

    document.getElementById('btnSearch').addEventListener('click', () => {
        const city = document.getElementById('cityInput').value;
        if(city) fetchWeather(city);
    });
</script>

</body>
</html>
