<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftShop | Responsive Store</title>
    <style>
        /* --- CSS3 Variables & Reset --- */
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
            --accent: #f59e0b;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }

        /* --- Layout: CSS Grid --- */
        .app-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
        }

        /* --- Header: Flexbox --- */
        header {
            background: var(--dark);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav a { color: white; text-decoration: none; cursor: pointer; font-weight: 500; }
        nav a:hover { color: var(--accent); }

        /* --- Main Content Area --- */
        main { padding: 2rem 5%; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Catalog: CSS Grid --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: var(--transition);
        }

        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 150px; object-fit: contain; margin-bottom: 1rem; }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }

        /* --- Forms (Login/Reg) --- */
        .form-container {
            max-width: 400px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 4px; }

        /* --- Cart Table --- */
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: white;
        }

        .cart-table th, .cart-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        /* --- Responsive Footer --- */
        footer {
            background: #eee;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            header { flex-direction: column; gap: 1rem; }
            nav ul { gap: 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>SwiftShop</h1>
        <nav>
            <ul id="nav-links">
                <li><a onclick="showPage('catalog')">Catalog</a></li>
                <li><a onclick="showPage('cart')">Cart (<span id="cart-count">0</span>)</a></li>
                <li><a onclick="showPage('login')">Login</a></li>
            </ul>
        </nav>
    </header>

    <main id="content">
        <section id="catalog" class="page active">
            <h2>Product Catalog</h2><br>
            <div class="product-grid" id="product-list">
                </div>
        </section>

        <section id="login" class="page">
            <div class="form-container">
                <h2>Login</h2><br>
                <form onsubmit="event.preventDefault(); alert('Logged in!'); showPage('catalog')">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" required>
                    </div>
                    <button class="btn">Login</button>
                    <p style="margin-top:1rem; font-size: 0.8rem;">Don't have an account? <a onclick="showPage('register')">Register</a></p>
                </form>
            </div>
        </section>

        <section id="register" class="page">
            <div class="form-container">
                <h2>Create Account</h2><br>
                <form onsubmit="event.preventDefault(); alert('Registered!'); showPage('login')">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" required>
                    </div>
                    <button class="btn" style="background: var(--accent);">Register</button>
                </form>
            </div>
        </section>

        <section id="cart" class="page">
            <h2>Your Shopping Cart</h2><br>
            <table class="cart-table">
                <thead>
                    <tr><th>Product</th><th>Price</th><th>Action</th></tr>
                </thead>
                <tbody id="cart-items">
                    </tbody>
            </table>
            <div id="cart-empty" style="text-align:center; padding: 2rem;">Your cart is empty.</div>
            <div style="margin-top: 2rem; text-align: right;">
                <h3 id="cart-total">Total: $0.00</h3>
                <button class="btn" style="width: auto; padding: 1rem 3rem;" onclick="alert('Proceeding to checkout...')">Checkout</button>
            </div>
        </section>
    </main>

    <footer>
        &copy; 2026 SwiftShop 
    </footer>
</div>

<script>
    // --- Data ---
    const products = [
        { id: 1, name: "Wireless Headphones", price: 99, img: "🎧" },
        { id: 2, name: "Smart Watch", price: 199, img: "⌚" },
        { id: 3, name: "Bluetooth Speaker", price: 50, img: "🔊" },
        { id: 4, name: "Laptop Sleeve", price: 30, img: "💻" }
    ];

    let cart = [];

    // --- Navigation Logic ---
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        window.scrollTo(0,0);
    }

    // --- Catalog Logic ---
    function renderProducts() {
        const list = document.getElementById('product-list');
        list.innerHTML = products.map(p => `
            <div class="card">
                <div style="font-size: 4rem; text-align:center">${p.img}</div>
                <div>
                    <h3>${p.name}</h3>
                    <p>$${p.price}</p>
                </div>
                <button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>
            </div>
        `).join('');
    }

    // --- Cart Logic ---
    function addToCart(id) {
        const item = products.find(p => p.id === id);
        cart.push(item);
        updateCart();
        alert(`${item.name} added to cart!`);
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCart();
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        const cartTable = document.getElementById('cart-items');
        const emptyMsg = document.getElementById('cart-empty');
        
        if (cart.length === 0) {
            cartTable.innerHTML = '';
            emptyMsg.style.display = 'block';
        } else {
            emptyMsg.style.display = 'none';
            cartTable.innerHTML = cart.map((item, index) => `
                <tr>
                    <td>${item.name}</td>
                    <td>$${item.price}</td>
                    <td><button onclick="removeFromCart(${index})" style="color:red; border:none; background:none; cursor:pointer">Remove</button></td>
                </tr>
            `).join('');
        }

        const total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('cart-total').innerText = `Total: $${total.toFixed(2)}`;
    }

    // Initialize
    renderProducts();
</script>

</body>
</html>
